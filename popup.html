<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
body{width:230px;font-family:-apple-system,sans-serif;margin:0;padding:16px;background:#0a0a1a;color:#fff;}
h2{margin:0 0 4px;font-size:14px;font-weight:700;color:#00d4ff;}
p{margin:0 0 10px;font-size:11px;color:#555;}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.label{font-size:12px;color:#aaa;}
.toggle{position:relative;display:inline-block;width:38px;height:20px;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#333;border-radius:20px;cursor:pointer;transition:background .2s;}
.slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s;}
input:checked+.slider{background:#00d4ff;}
input:checked+.slider::before{transform:translateX(18px);}
hr{border:none;border-top:1px solid #1a1a2e;margin:10px 0;}
.lights-btns{display:flex;gap:5px;margin-top:6px;}
.lb{flex:1;padding:5px 0;border-radius:10px;font-size:11px;cursor:pointer;border:1px solid #222;background:#111;color:#666;text-align:center;}
.lb.active{background:#001e3c;border-color:#00d4ff;color:#00d4ff;}
.note{font-size:10px;color:#444;margin-top:6px;line-height:1.4;}
</style></head><body>
<h2>🏎️ Bugatti Scrollbar</h2>
<p>Scroll any page to race!</p>
<div class="row">
  <span class="label">Enabled</span>
  <label class="toggle"><input type="checkbox" id="tog" checked><span class="slider"></span></label>
</div>
<hr>
<div class="label">💡 Headlights</div>
<div class="lights-btns">
  <div class="lb" id="la" onclick="setL(null)">Auto</div>
  <div class="lb" id="lon" onclick="setL(true)">Always On</div>
  <div class="lb" id="loff" onclick="setL(false)">Always Off</div>
</div>
<div class="note">⚠️ Windows Night Light only changes color warmth — it does not trigger dark mode. Use "Always On" to force headlights.</div>
<script src="popup.js"></script>
</body></html>
